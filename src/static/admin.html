<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MusicStreamer Admin</title>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
  <main class="admin-shell">
    <header class="admin-header">
      <div>
        <p class="eyebrow">MusicStreamer</p>
        <h1>Admin</h1>
      </div>
      <nav class="admin-nav">
        <a href="/">Player</a>
      </nav>
    </header>

    <section class="panel">
      <div class="panel-head">
        <div>
          <p class="label">Spotify</p>
          <h2>Credentials</h2>
        </div>
        <div id="spotify-link-state" class="badge">Loading</div>
      </div>

      <form id="spotify-settings-form" class="settings-form">
        <label class="field switch">
          <input id="spotify-enabled" type="checkbox">
          <span>Enable Spotify Connect</span>
        </label>

        <label class="field">
          <span>Device name</span>
          <input id="spotify-device-name" type="text" autocomplete="off">
        </label>

        <label class="field">
          <span>Bitrate</span>
          <input id="spotify-bitrate" type="number" min="96" max="320" step="1">
        </label>

        <label class="field">
          <span>Cache directory</span>
          <input id="spotify-cache-dir" type="text" autocomplete="off" placeholder="/tmp/librespot-cache">
        </label>

        <label class="field">
          <span>Client ID</span>
          <input id="spotify-client-id" type="text" autocomplete="off">
        </label>

        <label class="field">
          <span>Client Secret</span>
          <input id="spotify-client-secret" type="password" autocomplete="new-password" placeholder="Leave blank to keep current">
        </label>

        <label class="field">
          <span>Redirect URI</span>
          <input id="spotify-redirect-uri" type="url" autocomplete="off">
        </label>

        <div class="actions">
          <button id="spotify-save" type="submit">Save</button>
          <button id="spotify-link" type="button">Link account</button>
        </div>
      </form>

      <p id="admin-status" class="status">Ready</p>
    </section>
  </main>

  <script src="/static/js/admin.js" defer></script>
</body>
</html>
