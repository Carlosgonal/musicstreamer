<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=480, height=320, initial-scale=1">
  <title>MusicStreamer</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="device-screen" aria-label="MusicStreamer home">
    <header class="top-bar">
      <div>
        <p class="eyebrow">HiFi Streamer</p>
        <h1 id="project-name">MusicStreamer</h1>
      </div>
      <time id="clock" class="clock" datetime="">--:--</time>
    </header>

    <section class="status-panel" aria-live="polite">
      <div class="status-ring" aria-hidden="true"></div>
      <div>
        <p class="label">Status</p>
        <p id="system-status" class="status-text">Starting</p>
      </div>
    </section>

    <section class="source-row" aria-label="Sources">
      <article class="source active">
        <span class="source-dot"></span>
        <div>
          <p class="source-name">Spotify</p>
          <p id="spotify-status" class="source-state">Waiting</p>
        </div>
      </article>
      <article class="source">
        <span class="source-dot"></span>
        <div>
          <p class="source-name">Radio</p>
          <p id="radio-status" class="source-state">Waiting</p>
        </div>
      </article>
    </section>

    <footer class="bottom-bar">
      <span id="network-state">Local</span>
      <span class="home-indicator" aria-hidden="true"></span>
      <span id="volume-state">Vol 50%</span>
    </footer>
  </main>

  <script src="/static/js/app.js" defer></script>
</body>
</html>
