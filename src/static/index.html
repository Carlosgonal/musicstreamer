<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=480, height=320, initial-scale=1">
  <title>MusicStreamer</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="device-screen" aria-label="MusicStreamer home">
    <header class="top-bar">
      <div>
        <p class="eyebrow">HiFi Streamer</p>
        <h1 id="project-name">MusicStreamer</h1>
      </div>
      <time id="clock" class="clock" datetime="">--:--</time>
    </header>

    <section class="status-strip" aria-live="polite">
      <span class="status-dot" aria-hidden="true"></span>
      <span id="system-status">Starting</span>
      <span id="radio-status">Waiting</span>
    </section>

    <section class="source-panel" aria-label="Sources">
      <button id="spotify-source" class="source-button" type="button">
        <span>Spotify</span>
        <strong id="spotify-status">Ready</strong>
      </button>
      <button id="radio-toggle" class="source-button active" type="button">
        <span>Radio</span>
        <strong id="radio-action">Play</strong>
      </button>
    </section>

    <section id="radio-view" class="content-view radio-view" aria-label="Radio">
      <section class="tuner-panel" aria-label="Radio tuner">
        <button id="radio-prev" class="tune-button" type="button" aria-label="Previous station">-</button>
        <div class="tuner-display">
          <p class="label">FM</p>
          <p id="radio-frequency" class="frequency">99.9</p>
          <p id="radio-name" class="now-playing">Select station</p>
        </div>
        <button id="radio-next" class="tune-button" type="button" aria-label="Next station">+</button>
      </section>

      <section class="manual-panel" aria-label="Manual station selector">
        <input id="manual-frequency" type="number" min="87.5" max="108" step="0.1" value="99.9" aria-label="Manual frequency">
        <button id="manual-tune" type="button">Ir</button>
        <button id="manual-save" type="button">Guardar</button>
      </section>
    </section>

    <section id="spotify-view" class="content-view spotify-view hidden" aria-label="Spotify player">
      <img id="spotify-cover" class="spotify-cover" alt="" src="">
      <div class="spotify-info">
        <p id="spotify-track" class="spotify-track">Spotify</p>
        <p id="spotify-artist" class="spotify-artist">Vincula tu cuenta</p>
        <progress id="spotify-progress" class="spotify-progress" value="0" max="100"></progress>
        <p id="spotify-time" class="spotify-time">0:00 / 0:00</p>
      </div>
      <div class="spotify-controls" aria-label="Spotify controls">
        <button id="spotify-prev" type="button" aria-label="Previous track">Prev</button>
        <button id="spotify-playpause" type="button" aria-label="Pause or continue">Play</button>
        <button id="spotify-next" type="button" aria-label="Next track">Next</button>
      </div>
    </section>

    <dialog id="station-dialog" class="station-dialog">
      <form id="station-form" method="dialog">
        <input id="station-name-input" type="text" placeholder="Emisora" aria-label="Station name" required>
        <input id="station-url-input" type="url" placeholder="Stream URL" aria-label="Stream URL" required>
        <menu>
          <button id="station-cancel" type="button">Cancelar</button>
          <button type="submit">Guardar</button>
        </menu>
      </form>
    </dialog>

    <section class="audio-panel" aria-label="Audio controls">
      <label class="audio-output">
        <span>Out</span>
        <select id="audio-output-select" aria-label="Audio output">
          <option value="jack">Jack</option>
          <option value="hdmi">HDMI</option>
        </select>
      </label>
      <label class="volume-control">
        <input id="volume-control" type="range" min="0" max="100" step="1" value="50" aria-label="Volume">
      </label>
      <span id="volume-state">Vol 50%</span>
    </section>

    <footer class="bottom-bar">
      <span id="network-state">Local</span>
      <span class="home-indicator" aria-hidden="true"></span>
      <span id="audio-state">Jack</span>
    </footer>
  </main>

  <script src="/static/js/app.js" defer></script>
</body>
</html>
