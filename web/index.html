<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MusicStreamer</title>
  <link rel="stylesheet" href="/web/css/app.css">
</head>
<body>
  <main class="device" aria-label="MusicStreamer">
    <header class="topbar">
      <div>
        <p class="eyebrow">HiFi Streamer</p>
        <h1>MusicStreamer</h1>
      </div>
      <div class="topbar-actions">
        <a class="icon-link" href="/admin" aria-label="Open admin page" title="Admin">⚙</a>
        <div id="system-status" class="system-status" aria-live="polite">running</div>
      </div>
    </header>

    <section class="now-playing" aria-live="polite">
      <div class="cover" aria-hidden="true">
        <span id="source" class="source-badge">spotify</span>
      </div>
      <div class="meta">
        <p id="state" class="state">idle</p>
        <h2 id="title" class="title">Spotify Ready</h2>
        <p id="artist" class="artist">Waiting for playback</p>
      </div>
    </section>

    <section class="stats" aria-label="Playback details">
      <div class="stat">
        <span class="label">Volume</span>
        <strong id="volume" class="value">50%</strong>
      </div>
      <div class="stat">
        <span class="label">Album</span>
        <strong id="album" class="value">--</strong>
      </div>
    </section>
  </main>

  <script src="/web/js/app.js" defer></script>
</body>
</html>
