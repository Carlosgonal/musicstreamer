<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MusicStreamer</title>
  <link rel="stylesheet" href="/web/css/app.css?v=__ASSET_VERSION__">
</head>
<body>
  <main class="device" aria-label="MusicStreamer">
    <header class="topbar">
      <div>
        <p class="eyebrow">HiFi Streamer</p>
        <h1>MusicStreamer</h1>
      </div>
      <div class="topbar-actions">
        <a class="icon-link" href="/admin" aria-label="Open admin page" title="Admin">⚙</a>
        <div id="system-status" class="system-status" aria-live="polite">running</div>
      </div>
    </header>

    <section class="now-playing" aria-live="polite">
      <div class="artwork-card">
        <img id="artwork" class="artwork" alt="" hidden>
        <div id="artwork-fallback" class="artwork-fallback">MS</div>
        <button id="play-pause" class="play-pause" type="button" aria-label="Play">▶</button>
      </div>
      <div class="meta">
        <div class="now-playing-head">
          <span id="source" class="source-badge">spotify</span>
          <p id="state" class="state">idle</p>
        </div>
        <h2 id="title" class="title">Spotify Ready</h2>
        <p id="artist" class="artist">Waiting for playback</p>
        <p id="context" class="context">Album / station details</p>
        <div id="progress" class="progress">
          <div class="progress-row">
            <span id="elapsed" class="time">0:00</span>
            <span id="remaining" class="time">--:--</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="Source controls">
      <div class="control-block">
        <span class="label">Source</span>
        <div class="segmented" role="tablist" aria-label="Playback source">
          <button id="source-spotify" class="segment" type="button" data-source="spotify">Spotify</button>
          <button id="source-radio" class="segment" type="button" data-source="radio">Radio</button>
        </div>
      </div>
      <label class="control-block">
        <span class="label">Station</span>
        <select id="radio-station" class="select"></select>
      </label>
    </section>

    <section class="stats" aria-label="System details">
      <label class="stat volume-control">
        <span class="label">Volume</span>
        <input id="volume-slider" class="volume-slider" type="range" min="0" max="100" step="1" value="50" aria-label="Volume">
        <strong id="volume" class="value">50%</strong>
      </label>
    </section>
  </main>

  <script src="/web/js/app.js?v=__ASSET_VERSION__" defer></script>
</body>
</html>
